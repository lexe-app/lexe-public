[package]
name = "lexe-payment-uri-core"
version = "0.1.0"
license = "MIT"
description = "I/O-free Bitcoin payment URI parsing and encoding"
documentation = "https://docs.rs/lexe-payment-uri-core"
authors = { workspace = true }
edition = { workspace = true }
readme = { workspace = true }
repository = { workspace = true }
rust-version = { workspace = true }
publish = true

[dependencies]

# --- LEXE --- #

lexe-api-core = { path = "../lexe-api-core" }
lexe-common = { path = "../lexe-common" }
lexe-crypto = { path = "../lexe-crypto" }

# --- WORKSPACE --- #

anyhow = { workspace = true }
bech32 = { workspace = true }
bitcoin = { workspace = true }
percent-encoding = { workspace = true }
rust_decimal = { workspace = true }
rust_decimal_macros = { workspace = true }
serde_json = { workspace = true }

[dev-dependencies]
lexe-api-core = { path = "../lexe-api-core", features = ["test-utils"] }
lexe-common = { path = "../lexe-common", features = ["test-utils"] }

proptest = { workspace = true, features = ["alloc"] }
proptest-derive = { workspace = true }
