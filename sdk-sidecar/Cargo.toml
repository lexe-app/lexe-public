[package]
name = "sdk-sidecar"
version = "0.4.2"
license = "MIT"
authors = { workspace = true }
edition = { workspace = true }
# Not actually published to crates.io, but set to true so cargo-deny lints it.
publish = true

[[bin]]
name = "lexe-sidecar"
path = "src/main.rs"

[dependencies]

# --- LEXE --- #

lexe = { workspace = true }
lexe-api = { workspace = true }
lexe-common = { workspace = true }
lexe-crypto = { workspace = true }
lexe-logger = { workspace = true }
lexe-node-client = { workspace = true }
lexe-std = { workspace = true }
lexe-tls-core = { workspace = true, features = ["webpki-roots"] }
lexe-tokio = { workspace = true }

# --- WORKSPACE --- #

anyhow = { workspace = true }
argh = { workspace = true }
axum = { workspace = true }
dotenvy = { workspace = true }
futures = { workspace = true }
http = { workspace = true }
quick_cache = { workspace = true }
reqwest = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = [
    "rt",
    "signal",
] }
tracing = { workspace = true }
