[package]
name = "sdk-sidecar"
authors.workspace = true
edition.workspace = true
license.workspace = true
version = "0.4.1"
# Not actually published to crates.io, but set to true so cargo-deny lints it.
publish = true

[[bin]]
name = "lexe-sidecar"
path = "src/main.rs"

[dependencies]

# --- LEXE --- #

common = { path = "../common" }
lexe = { path = "../lexe" }
lexe-api = { path = "../lexe-api" }
lexe-logger = { path = "../lexe-logger" }
lexe-std.path = "../lexe-std"
lexe-tls-core = { path = "../lexe-tls-core", features = ["webpki-roots"] }
lexe-tokio = { path = "../lexe-tokio" }
node-client.path = "../node-client"

# --- WORKSPACE --- #

anyhow.workspace = true
argh.workspace = true
axum.workspace = true
dotenvy.workspace = true
futures.workspace = true
http.workspace = true
quick_cache.workspace = true
reqwest.workspace = true
serde.workspace = true
serde_json.workspace = true
tokio = { workspace = true, features = [
    "rt",
    "signal",
] }
tracing.workspace = true
