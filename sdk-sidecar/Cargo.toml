[package]
name = "sdk-sidecar"
version = "0.4.2"
license = "MIT"
authors = { workspace = true }
edition = { workspace = true }
# Not actually published to crates.io, but set to true so cargo-deny lints it.
publish = true

[[bin]]
name = "lexe-sidecar"
path = "src/main.rs"

[dependencies]

# --- LEXE --- #

lexe = { path = "../lexe" }
lexe-api = { path = "../lexe-api" }
lexe-common = { path = "../lexe-common" }
lexe-crypto = { path = "../lexe-crypto" }
lexe-logger = { path = "../lexe-logger" }
lexe-node-client = { path = "../lexe-node-client" }
lexe-std = { path = "../lexe-std" }
lexe-tls-core = { path = "../lexe-tls-core", features = ["webpki-roots"] }
lexe-tokio = { path = "../lexe-tokio" }

# --- WORKSPACE --- #

anyhow = { workspace = true }
argh = { workspace = true }
axum = { workspace = true }
dotenvy = { workspace = true }
futures = { workspace = true }
http = { workspace = true }
quick_cache = { workspace = true }
reqwest = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = [
    "rt",
    "signal",
] }
tracing = { workspace = true }
