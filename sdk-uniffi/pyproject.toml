[project]
name = "lexe-sdk"
version = "0.1.1"
requires-python = ">=3.10"
# ^^^^^^^^^^^^^^^^^^^^^^^^
# NOTE(phlip9): we grep out the `requires-python` above, so don't change the
# layout without also updating the PYTHON_VERSION grep in
# <.github/workflows/release-sdk-python.yml>
description = "Control Lexe self-custody Bitcoin wallets with the Lexe Python SDK"
readme = "README-PYTHON.md"
license = "MIT"
license-files = ["LICENSE"]
authors = [ { name = "Lexe Corporation", email = "no-reply@lexe.app" } ]
classifiers = [
    "Programming Language :: Rust",
    "Programming Language :: Python :: Implementation :: CPython",
    "Programming Language :: Python :: Implementation :: PyPy",
]
keywords = [
    "lexe", "bitcoin", "lightning", "wallet", "payments", "crypto", "btc",
    "ln", "non-custodial", "self-custody"
]

# TODO(phlip9): if we can finally get the `lexe` package name, use that.
# PyPI support issue: <https://github.com/pypi/support/issues/9529>.
#
# We can cleanly transition to the `lexe` package name like this:
# 1. rename and publish all future updates to the new `lexe` package
# 2. publish a final `lexe-sdk` "shim" package that simply depends on `lexe`
#    (wildcard). since we're using `import lexe` even now, old consumers can
#    seamlessly get package updates even if they don't change their
#    pyproject.toml dependency. Ideally we can figure out how to mark
#    `lexe-sdk` "deprecated" so that all consumers can move to directly
#    depending on `lexe`.

[project.urls]
homepage = "https://lexe.app"
documentation = "https://python.lexe.app"
source = "https://github.com/lexe-app/lexe-public/tree/master/sdk-uniffi"
repository = "https://github.com/lexe-app/lexe-sdk"
changelog = "https://github.com/lexe-app/lexe-sdk/releases"

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    # NOTE(phlip9): Add `--compatibility pypi` back in to aarch64-linux maturin
    #   build after we upgrade to maturin v1.11.5+:
    #   <https://github.com/pyo3/maturin/pull/2928>
    "maturin>=1.10,<2.0", # keep in sync with below
    "sphinx>=8.0", # docs generation
    "furo", # docs theme
]

[build-system]
requires = ["maturin>=1.10,<2.0"] # keep in sync with above
build-backend = "maturin"

[tool.maturin]
python-source = "python"
bindings = "uniffi"
include = [
    # Mandate our Rust toolchain for users building from source.
    #
    # NOTE: `maturin` will automatically install `rustup` into a tempdir for
    # users with no Rust toolchain installed.
    { path = "rust-toolchain.toml", format = ["sdist"] },

    # Ensure our releases.json file gets included for SDK provision
    { path = "releases.json", format = ["sdist"] },
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["python/tests"]
# Skip integration tests by default (run with -m integration to include)
addopts = "-m 'not integration'"
markers = [
    "integration: marks tests as integration tests (require gateway/network)"
]
